[[forums]]
# NGA 论坛配置
[forums.NGA]
# 论坛名称
name = "NGA"
# 论坛基础 URL
# !注意：bbs.nga.cn域名不支持从浏览器获取Cookie，建议使用nga.178.com
base_url = "https://nga.178.com"
# 认证方式（NGA 不支持游客模式和用户名密码登录）
auth_method = { CookieFromBrowser = "Firefox" }
# remove_ads = true
# remove_user_info = true
# remove_reply_box = true
# interval_ms = 1500


# 配置说明：
# 1. 认证方式获取方法：
#    - CookieFromBrowser: 会自动从指定浏览器中获取对应网站的 Cookie
#    - CookieString: 在浏览器中按 F12 打开开发者工具，进入网络(Network)标签，刷新页面，选择任意请求，在请求头(Request Headers)中找到 Cookie 字段，复制其值
#    - UsernamePassword: 直接填写论坛账号和密码（部分论坛可能需要验证码，不推荐使用）

# 2. Discuz 选择器配置：
#    - 当默认选择器无法正确识别页面元素时，可以通过浏览器开发者工具获取对应元素的 CSS 选择器
#    - 方法：在浏览器中按 F12 打开开发者工具，选择元素选择器工具，点击需要选择的元素，在开发者工具右侧查看其 CSS 选择器

# 3. 页面下载间隔：
#    - 为避免触发论坛的访问限制，建议设置合理的下载间隔
#    - 设置为 0 时会异步下载所有页面，速度快但容易触发封禁

# 4. 存储目录：
#    - 下载的帖子会保存在 store_dir/论坛名称/ 目录下
#    - 帖子内容保存在 posts 子目录，资源文件保存在 assets 子目录