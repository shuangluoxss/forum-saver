name: Release Build

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取所有历史记录，以便获取标签信息

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build release
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Prepare release assets
        id: prepare_assets
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ASSET_NAME="forum-saver-${{ env.VERSION }}-windows-x86_64.exe"
            cp target/release/forum-saver.exe "$ASSET_NAME"
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            ASSET_NAME="forum-saver-${{ env.VERSION }}-linux-x86_64"
            cp target/release/forum-saver "$ASSET_NAME"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            ASSET_NAME="forum-saver-${{ env.VERSION }}-macos-x86_64"
            cp target/release/forum-saver "$ASSET_NAME"
          fi
          echo "ASSET_NAME=$ASSET_NAME" >> $GITHUB_ENV
          echo "ASSET_PATH=$ASSET_NAME" >> $GITHUB_ENV

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ./${{ env.ASSET_NAME }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded artifacts
        run: ls -R ./artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/**/*