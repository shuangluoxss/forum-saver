name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-cli:
    name: Build CLI for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI release
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: forum-saver

      - name: Prepare and compress CLI assets
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BINARY_NAME="forum-saver.exe"
            ARCHIVE_NAME="forum-saver_${{ github.ref_name }}_windows-x86_64.zip"
            cp target/${{ matrix.target }}/release/forum-saver.exe "$BINARY_NAME"
            7z a "$ARCHIVE_NAME" "$BINARY_NAME"
          else
            BINARY_NAME="forum-saver"
            if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
              ARCHIVE_NAME="forum-saver_${{ github.ref_name }}_macos-aarch64.tar.gz"
            elif [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
              ARCHIVE_NAME="forum-saver_${{ github.ref_name }}_macos-x86_64.tar.gz"
            else
              ARCHIVE_NAME="forum-saver_${{ github.ref_name }}_linux-x86_64.tar.gz"
            fi
            cp target/${{ matrix.target }}/release/forum-saver "$BINARY_NAME"
            tar -czf "$ARCHIVE_NAME" "$BINARY_NAME"
          fi
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ./${{ env.ARCHIVE_NAME }}

  build-tauri:
    name: Build Tauri for ${{ matrix.platform }} ${{ matrix.args }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: tauri-app

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: './tauri-app'
          tagName: ${{ github.ref_name }}
          releaseName: 'Release ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  upload-cli-assets:
    name: Upload CLI Assets
    runs-on: ubuntu-latest
    needs: [build-cli, build-tauri]
    permissions:
      contents: write

    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: forum-saver_*
          merge-multiple: true

      - name: Upload CLI assets to Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./artifacts/**/*
