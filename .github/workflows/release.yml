name: Release Build

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build release
        run: cargo build --release

      - name: Prepare and compress release assets
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BINARY_NAME="forum-saver.exe"
            ARCHIVE_NAME="forum-saver-${{ github.ref_name }}-windows-x86_64.zip"
            cp target/release/forum-saver.exe "$BINARY_NAME"
            
            if command -v zip &> /dev/null; then
              zip "$ARCHIVE_NAME" "$BINARY_NAME"
            elif command -v 7z &> /dev/null; then
              7z a "$ARCHIVE_NAME" "$BINARY_NAME"
            else
              powershell -Command "Compress-Archive -Path '$BINARY_NAME' -DestinationPath '$ARCHIVE_NAME' -Force"
            fi
            
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            BINARY_NAME="forum-saver"
            ARCHIVE_NAME="forum-saver-${{ github.ref_name }}-linux-x86_64.tar.gz"
            cp target/release/forum-saver "$BINARY_NAME"
            tar -czf "$ARCHIVE_NAME" "$BINARY_NAME"
            
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            BINARY_NAME="forum-saver"
            ARCHIVE_NAME="forum-saver-${{ github.ref_name }}-macos-x86_64.tar.gz"
            cp target/release/forum-saver "$BINARY_NAME"
            tar -czf "$ARCHIVE_NAME" "$BINARY_NAME"
          fi
          
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ./${{ env.ARCHIVE_NAME }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/**/*